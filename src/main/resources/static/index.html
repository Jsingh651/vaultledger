<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultLedger</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <span class="logo">₿</span>
        <h1>VaultLedger</h1>
      </div>
      <button class="btn-add" onclick="openModal()">+ Add Transaction</button>
    </header>

    <section class="summary-cards">
      <div class="card income">
        <span class="label">Income</span>
        <span class="amount" id="total-income">$0.00</span>
      </div>
      <div class="card expense">
        <span class="label">Expenses</span>
        <span class="amount" id="total-expenses">$0.00</span>
      </div>
      <div class="card balance">
        <span class="label">Balance</span>
        <span class="amount" id="balance">$0.00</span>
      </div>
    </section>

    <div class="content-grid">
      <section class="panel">
        <h2>Recent Transactions</h2>
        <table id="transactions-table">
